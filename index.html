<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 실시간 전략 코치</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; width: 100%; max-width: 600px; margin-bottom: 20px; border: 1px solid #334155; }
        h1 { color: var(--accent); margin-bottom: 40px; }
        h2 { color: var(--accent); font-size: 1.2rem; margin-top: 0; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .status-live { background: #059669; color: white; }
        .status-off { background: #475569; color: white; }
        .tip { background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); padding: 15px; margin-top: 10px; font-weight: bold; color: #fff; }
        .footer { font-size: 0.8rem; color: #64748b; margin-top: 40px; }
    </style>
</head>
<body>
    <h1>🎯 AI 실시간 전략 코치</h1>
    
    <div id="status-card" class="card">
        <div id="badge" class="status-badge">확인 중...</div>
        <p id="message">데이터를 불러오는 중입니다.</p>
    </div>

    <div id="content" style="display: none;">
        <div class="card">
            <h2>🏆 승리 요약</h2>
            <p id="summary"></p>
        </div>
        <div class="card">
            <h2>🔥 핵심 전략</h2>
            <p id="victory-plan"></p>
        </div>
        <div class="card">
            <h2>⚠️ 주의사항</h2>
            <p id="danger"></p>
        </div>
        <div class="card tip">
            <p id="one-line-tip"></p>
        </div>
    </div>

    <div class="footer">
        최근 분석: <span id="timestamp">-</span> (5분마다 자동 갱신)
    </div>

    <script>
        async function loadStrategy() {
            try {
                // Fetch with cache busting
                const res = await fetch('strategy.json?t=' + new Date().getTime());
                const data = await res.json();

                const badge = document.getElementById('badge');
                const message = document.getElementById('message');
                const content = document.getElementById('content');
                const timestamp = document.getElementById('timestamp');

                timestamp.innerText = data.timestamp || "-";

                if (data.status === "success") {
                    badge.innerText = "LIVE: 게임 중";
                    badge.className = "status-badge status-live";
                    message.innerText = `현재 [${data.game_mode}] 게임 분석 중입니다.`;
                    content.style.display = "block";

                    document.getElementById('summary').innerText = data.analysis.summary;
                    document.getElementById('victory-plan').innerText = data.analysis.victory_plan;
                    document.getElementById('danger').innerText = data.analysis.danger_points;
                    document.getElementById('one-line-tip').innerText = `💡 ${data.analysis.one_line_tip}`;
                } else {
                    badge.innerText = "OFFLINE";
                    badge.className = "status-badge status-off";
                    message.innerText = data.message || "현재 게임 중이 아닙니다.";
                    content.style.display = "none";
                }
            } catch (e) {
                document.getElementById('message').innerText = "분석 데이터를 찾을 수 없습니다. (첫 분석 대기 중)";
            }
        }
        loadStrategy();
        setInterval(loadStrategy, 60000); // UI 1분마다 갱신 확인
    </script>
</body>
</html>
