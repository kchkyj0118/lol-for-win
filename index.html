<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 실시간 전략 코치</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .search-box { margin-bottom: 30px; display: flex; gap: 10px; background: var(--card); padding: 20px; border-radius: 12px; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { padding: 10px 20px; border-radius: 6px; border: none; background: var(--accent); color: #0f172a; font-weight: bold; cursor: pointer; }
        .result-container { max-width: 800px; width: 100%; display: none; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        h2 { color: var(--accent); margin-top: 0; }
        .loading { display: none; color: var(--accent); font-weight: bold; }
        .matchup { border-bottom: 1px solid #334155; padding: 10px 0; }
        .matchup:last-child { border: none; }
        .line-name { font-weight: bold; color: #f1c40f; margin-right: 10px; }
    </style>
</head>
<body>
    <h1>🎯 AI 실시간 전략 코치</h1>
    
    <div class="search-box">
        <input type="text" id="name" placeholder="닉네임 (예: Hide on bush)">
        <input type="text" id="tag" placeholder="태그 (예: KR1)">
        <button onclick="getAnalysis()">전략 분석 시작</button>
    </div>

    <div id="loading" class="loading">AI 분석 중... (약 10초 소요)</div>

    <div id="result" class="result-container">
        <div class="card">
            <h2>🏆 핵심 승리 플랜</h2>
            <p id="victory-plan"></p>
        </div>

        <div class="card">
            <h2>🗺️ 라인별 상성 및 전략</h2>
            <div id="lane-matchups"></div>
        </div>

        <div class="card">
            <h2>⚠️ 주의 스킬</h2>
            <ul id="danger-skills"></ul>
        </div>
    </div>

    <script>
        async function getAnalysis() {
            const name = document.getElementById('name').value;
            const tag = document.getElementById('tag').value;
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            if (!name || !tag) {
                alert("닉네임과 태그를 모두 입력해주세요.");
                return;
            }

            loading.style.display = 'block';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch(`/analyze?name=${encodeURIComponent(name)}&tag=${encodeURIComponent(tag)}`);
                const data = await response.json();

                if (data.status === 'success') {
                    const analysis = data.analysis;
                    document.getElementById('victory-plan').innerText = analysis.victory_plan;
                    
                    const matchupsDiv = document.getElementById('lane-matchups');
                    matchupsDiv.innerHTML = analysis.lane_matchups.map(m => `
                        <div class="matchup">
                            <span class="line-name">[${m.line}]</span>
                            <span>${m.strategy}</span>
                        </div>
                    `).join('');

                    const skillsList = document.getElementById('danger-skills');
                    skillsList.innerHTML = analysis.danger_skills.map(s => `<li>${s}</li>`).join('');

                    resultDiv.style.display = 'block';
                } else {
                    alert(data.message || data.error || "분석 실패");
                }
            } catch (e) {
                alert("서버 연결 실패");
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
